name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            xlizer1/kinetic-frontend:latest
            xlizer1/kinetic-frontend:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            VITE_API_URL=https://api.kinetic.kite-app.online/api
            VITE_WS_URL=wss://api.kinetic.kite-app.online/ws

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/kite/kinetic-frontend
            
            if [ ! -f /opt/kite/kinetic-frontend/docker-compose.yml ]; then
              cat > /opt/kite/kinetic-frontend/docker-compose.yml << 'ENDFILE'
services:
  frontend:
    image: xlizer1/kinetic-frontend:latest
    container_name: kinetic-frontend
    restart: unless-stopped
    ports:
      - "6769:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  kinetic-network:
    external: true
    name: kinetic-backend_kinetic-network
ENDFILE
            fi
            
            cd /opt/kite/kinetic-frontend
            
            docker tag xlizer1/kinetic-frontend:latest xlizer1/kinetic-frontend:previous || true
            
            docker compose pull frontend
            
            docker compose rm -f frontend 2>/dev/null || true
            docker compose up -d frontend
            
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "xlizer1/kinetic-frontend:" | grep -v "latest\|previous" | tail -n +3 | xargs -r docker rmi || true
