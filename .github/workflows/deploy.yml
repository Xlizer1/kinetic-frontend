name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            xlizer1/kinetic-frontend:latest
            xlizer1/kinetic-frontend:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/kite/kinetic-frontend
            if [ ! -d /opt/kite/kinetic-frontend/.git ]; then
              git clone git@github.com:Xlizer1/kinetic-frontend.git /opt/kite/kinetic-frontend
            fi
            cd /opt/kite/kinetic-frontend
            git fetch origin
            git checkout main
            git pull origin main
            
            # Tag current image as previous before pulling new one
            docker tag xlizer1/kinetic-frontend:latest xlizer1/kinetic-frontend:previous || true
            
            # Pull new image
            docker compose pull frontend
            
            # Restart container
            docker compose rm -f frontend 2>/dev/null || true
            docker compose up -d frontend
            
            # Clean up old images on VPS (keep latest + previous)
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "xlizer1/kinetic-frontend:" | grep -v "latest\|previous" | tail -n +3 | xargs -r docker rmi || true
