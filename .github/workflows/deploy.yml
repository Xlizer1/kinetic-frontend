name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            xlizer1/kinetic-frontend:latest
            xlizer1/kinetic-frontend:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            VITE_API_URL=https://api.kinetic.kite-app.online/api
            VITE_WS_URL=wss://api.kinetic.kite-app.online/ws

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/kite/kinetic-frontend
            
            if [ ! -f /opt/kite/kinetic-frontend/docker-compose.yml ]; then
              echo 'services:' > /opt/kite/kinetic-frontend/docker-compose.yml
              echo '  frontend:' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '    image: xlizer1/kinetic-frontend:latest' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '    container_name: kinetic-frontend' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '    restart: unless-stopped' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '    ports:' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '      - "6769:80"' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '    extra_hosts:' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '      - "host.docker.internal:host-gateway"' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo 'networks:' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '  kinetic-network:' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '    external: true' >> /opt/kite/kinetic-frontend/docker-compose.yml
              echo '    name: kinetic-backend_kinetic-network' >> /opt/kite/kinetic-frontend/docker-compose.yml
            fi
            
            cd /opt/kite/kinetic-frontend
            
            # Always pull latest image
            docker pull xlizer1/kinetic-frontend:latest
            
            # Force remove any existing container (manually created or via compose)
            docker rm -f kinetic-frontend 2>/dev/null || true
            
            # Start fresh container
            docker run -d \
              --name kinetic-frontend \
              --network kinetic-backend_kinetic-network \
              --restart unless-stopped \
              -p 6769:80 \
              xlizer1/kinetic-frontend:latest
            
            # Clean up old images (keep latest + previous)
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "xlizer1/kinetic-frontend:" | grep -v "latest\|previous" | tail -n +3 | xargs -r docker rmi || true
